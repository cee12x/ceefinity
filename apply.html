<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Careers Portal | Ceefinity</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#121212] text-zinc-300 font-sans antialiased">

    <nav class="bg-black/40 border-b border-zinc-800/80 p-4 sticky top-0 backdrop-blur-md z-50">
        <div class="container mx-auto flex justify-between items-center px-4">
            <a href="logistics.html" class="text-xs uppercase font-bold tracking-widest text-zinc-400 hover:text-white transition">
                &larr; Back to Careers
            </a>
            <span class="text-xs uppercase tracking-widest text-zinc-600 font-semibold font-mono">Secure Candidate Portal</span>
        </div>
    </nav>

    <div class="container mx-auto py-20 px-6 max-w-4xl">
        <div class="bg-zinc-900/60 p-8 md:p-10 rounded-sm border border-zinc-800/80 shadow-2xl backdrop-blur-sm">
            <h2 class="text-2xl font-bold mb-2 text-white tracking-tight">Submit Career Profile</h2>
            <p class="text-zinc-500 text-sm mb-8">Please fill out the information architecture parameters below to submit your application to the Ceefinity logistics asset network.</p>
            
            <form action="https://formspree.io/f/mbdegpwz" method="POST" enctype="multipart/form-data" class="space-y-6">
                <input type="hidden" name="_next" value="https://ceefinity.com/thank-you.html">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs uppercase tracking-wider text-zinc-400 font-semibold mb-2">Full Legal Name</label>
                        <input type="text" name="applicant_name" autocomplete="name" required placeholder="John Doe" class="w-full bg-zinc-950 border border-zinc-800 text-white p-3 rounded-sm focus:outline-none focus:border-zinc-600 text-sm transition">
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-wider text-zinc-400 font-semibold mb-2">Target Position</label>
                        <select name="applicant_target_role" class="w-full bg-zinc-950 border border-zinc-800 text-zinc-400 p-3 rounded-sm focus:outline-none focus:border-zinc-600 text-sm transition">
                            <option value="senior-dispatcher">Senior Freight Dispatcher</option>
                            <option value="junior-dispatch-assistant">Junior Dispatch Assistant</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs uppercase tracking-wider text-zinc-400 font-semibold mb-2">Email Address</label>
                        <input type="email" name="applicant_email" autocomplete="email" required placeholder="john@example.com" class="w-full bg-zinc-950 border border-zinc-800 text-white p-3 rounded-sm focus:outline-none focus:border-zinc-600 text-sm transition">
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-wider text-zinc-400 font-semibold mb-2">Contact Phone</label>
                        <input type="tel" name="applicant_phone" autocomplete="tel" required placeholder="(555) 000-0000" class="w-full bg-zinc-950 border border-zinc-800 text-white p-3 rounded-sm focus:outline-none focus:border-zinc-600 text-sm transition">
                    </div>
                </div>

                <div>
                    <label class="block text-xs uppercase tracking-wider text-zinc-400 font-semibold mb-2">Attach Resume (PDF, DOCX)</label>
                    <div class="bg-zinc-950 border border-zinc-800 p-4 rounded-sm relative">
                        <input type="file" name="applicant_resume" accept=".pdf,.doc,.docx" required class="text-sm text-zinc-400 file:mr-4 file:py-2 file:px-4 file:rounded-sm file:border-0 file:text-xs file:font-semibold file:bg-zinc-800 file:text-white hover:file:bg-zinc-700 cursor-pointer">
                    </div>
                </div>

                <div>
                    <label class="block text-xs uppercase tracking-wider text-zinc-400 font-semibold mb-2">Professional Summary / Logistics Background</label>
                    <textarea name="applicant_experience_summary" rows="5" required placeholder="Tell us about your active broker lanes management, track records, or software systems familiarity..." class="w-full bg-zinc-950 border border-zinc-800 text-white p-3 rounded-sm focus:outline-none focus:border-zinc-600 text-sm transition"></textarea>
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-zinc-100 to-zinc-300 text-black font-bold py-4 text-xs tracking-widest uppercase rounded-sm shadow-xl transition duration-300 hover:from-white hover:to-zinc-200">
                    Deploy Application File
                </button>
            </form>
        </div>
    </div>

    <footer class="bg-black py-6 text-center text-xs text-zinc-700 border-t border-zinc-900/60 mt-12">
        &copy; 2026 Ceefinity Human Resource Infrastructure.
    </footer>

</body>
</html>
